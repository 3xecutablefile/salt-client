name: Build, Release, Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (for example: v1.1.7)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare_release:
    runs-on: ubuntu-latest

    outputs:
      tag: ${{ steps.prepare.outputs.tag }}
      should_release: ${{ steps.prepare.outputs.should_release }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag and prepare release
        id: prepare
        run: |
          EVENT="${{ github.event_name }}"
          REF="${GITHUB_REF}"
          TAG=""

          if [ "$EVENT" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
            if [ -z "$TAG" ]; then
              echo "workflow_dispatch requires a tag input."
              exit 1
            fi
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          elif [[ "$REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF_NAME}"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          elif [ "$REF" = "refs/heads/main" ]; then
            git fetch --tags --force
            VERSION="$(grep '^mod_version=' gradle.properties | cut -d'=' -f2)"
            if [ -z "$VERSION" ]; then
              echo "mod_version is missing in gradle.properties."
              exit 1
            fi

            TAG="v$VERSION"
            if git rev-parse "$TAG" >/dev/null 2>&1; then
              echo "Tag $TAG already exists. Skipping release on this main push."
              echo "should_release=false" >> "$GITHUB_OUTPUT"
            else
              git tag "$TAG"
              git push origin "$TAG"
              echo "Created and pushed tag $TAG."
              echo "should_release=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "Event does not require release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$TAG" ]; then
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: prepare_release
    if: ${{ needs.prepare_release.outputs.should_release == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag exists
        run: git rev-parse "${{ needs.prepare_release.outputs.tag }}" >/dev/null

      - name: Checkout release tag
        run: git checkout "${{ needs.prepare_release.outputs.tag }}"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew --no-daemon build

      - name: Validate Modrinth configuration
        run: |
          if [ -z "${{ secrets.MODRINTH_TOKEN }}" ]; then
            echo "Repository secret MODRINTH_TOKEN is missing."
            exit 1
          fi

      - name: Publish GitHub release and Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-tag: ${{ needs.prepare_release.outputs.tag }}
          modrinth-id: 3VJYuZ6G
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: build/libs/!(*-@(dev|sources|javadoc)).jar
